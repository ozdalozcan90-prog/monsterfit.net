<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MonsterFit AI+</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial;background:#050505;color:#fff}
header{display:flex;justify-content:space-between;padding:20px;background:#000}
h1{color:#00ff88}
section{padding:30px;text-align:center}
input,button{padding:10px;margin:10px;border:none;border-radius:6px}
button{background:#00ff88;color:#000;cursor:pointer}
.card{background:#111;padding:20px;margin:10px;border-radius:10px}
</style>
</head>
<body>

<header>
<h1>MonsterFit AI+</h1>
</header>

<section>
<h2>👤 Kullanıcı</h2>
<input id="usernameInput" placeholder="Kullanıcı adı">
<button onclick="saveUser()">Kaydet</button>
<div id="userBox" class="card"></div>
</section>

<section>
<h2>🤖 AI Antrenör</h2>
<input id="goal" placeholder="Hedef (kilo ver / kas yap / fit kal)">
<button onclick="generatePlan()">Plan Oluştur</button>
<div id="plan" class="card"></div>
</section>

<section>
<h2>📊 Kilo Takibi</h2>
<input id="weight" placeholder="Kilon">
<button onclick="addWeight()">Kaydet</button>
<div id="weights" class="card"></div>
</section>

<section>
<h2>🏋️ Günlük Görevler</h2>
<button onclick="generateTasks()">Görev Ver</button>
<div id="tasks" class="card"></div>
</section>

<script>
// USER SYSTEM
function saveUser(){
let u=document.getElementById('usernameInput').value;
localStorage.setItem('user',u);
showUser();
}
function showUser(){
let u=localStorage.getItem('user');
document.getElementById('userBox').innerText=u? 'Hoşgeldin '+u : 'Kullanıcı yok';
}
showUser();

// AI TRAINER (daha akıllı)
function generatePlan(){
let goal=document.getElementById('goal').value.toLowerCase();
let plan='';

if(goal.includes('kilo')){
plan='🔥 Yağ yakım: 5 gün kardiyo + kalori açığı + HIIT';
}else if(goal.includes('kas')){
plan='💪 Kas: 4 gün split + protein ağırlıklı beslenme';
}else{
plan='⚡ Fit: 3 gün full body + dengeli diyet';
}

document.getElementById('plan').innerText=plan;
}

// WEIGHT TRACK (kullanıcıya özel)
function getKey(){
return 'weights_'+(localStorage.getItem('user')||'guest');
}

let weightData = JSON.parse(localStorage.getItem(getKey())) || [];

function addWeight(){
let w=document.getElementById('weight').value;
weightData.push(w);
localStorage.setItem(getKey(),JSON.stringify(weightData));
showWeights();
}

function showWeights(){
let data=JSON.parse(localStorage.getItem(getKey())) || [];
document.getElementById('weights').innerText=data.join(' → ')+' kg';
}
showWeights();

// DAILY TASKS
function generateTasks(){
let tasks=[
"💧 3 litre su iç",
"🏃 30 dk kardiyo yap",
"💪 4 set antrenman yap",
"🥗 sağlıklı beslen",
"😴 7-8 saat uyu"
];
let random=tasks.sort(()=>0.5-Math.random()).slice(0,3);
document.getElementById('tasks').innerText=random.join('\n');
}
</script>

</body>
</html>
