<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MonsterFit App</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial;background:#050505;color:#fff;display:flex}

/* SIDEBAR */
.sidebar{
width:220px;
background:#000;
height:100vh;
padding:20px;
position:fixed
}
.sidebar h2{color:#00ff88;margin-bottom:30px}
.sidebar button{
display:block;width:100%;margin:10px 0;padding:12px;
background:#111;color:#fff;border:none;border-radius:6px;
cursor:pointer
}
.sidebar button:hover{background:#00ff88;color:#000}

/* MAIN */
.main{margin-left:220px;padding:30px;width:100%}
.section{display:none}
.active{display:block}

.card{background:#111;padding:20px;border-radius:10px;margin:10px 0}

button.action{
background:#00ff88;color:#000;padding:10px;border:none;
border-radius:5px;cursor:pointer;margin:5px
}
</style>
</head>

<body>

<div class="sidebar">
<h2>MonsterFit</h2>

<button onclick="show('dashboard')">🏠 Dashboard</button>
<button onclick="show('program')">💪 Program</button>
<button onclick="show('ai')">🤖 AI</button>
<button onclick="show('weight')">📊 Kilo</button>
<button onclick="show('tasks')">🏋️ Görev</button>

</div>

<div class="main">

<div id="dashboard" class="section active">
<h2>Dashboard</h2>
<div class="card">Hoşgeldin 💪</div>
</div>

<div id="program" class="section">
<h2>Programlar</h2>

<button class="action" onclick="showProgram('kas')">💪 Kas Bas</button>
<button class="action" onclick="showProgram('kilo')">🔥 Yağ Yak</button>

<div id="programDetail" class="card"></div>
</div>

<div id="ai" class="section">
<h2>AI</h2>
<input id="goal" placeholder="kilo ver / kas yap">
<button class="action" onclick="createPlan()">Plan</button>
<div id="plan" class="card"></div>
</div>

<div id="weight" class="section">
<h2>Kilo</h2>
<input id="w" placeholder="kilo">
<button class="action" onclick="addW()">Ekle</button>
<div id="list" class="card"></div>
</div>

<div id="tasks" class="section">
<h2>Görev</h2>
<button class="action" onclick="generateTasks()">Ver</button>
<div id="taskList" class="card"></div>
</div>

</div>

<script>

function show(id){
document.querySelectorAll('.section').forEach(s=>s.style.display='none');
document.getElementById(id).style.display='block';
}

/* PROGRAM */
function showProgram(type){
let text='';

if(type==='kas'){
text='💪 Kas Programı:\\n- 4 gün ağırlık\\n- Protein\\n- Dinlenme';
}

if(type==='kilo'){
text='🔥 Yağ Yakım:\\n- Kardiyo\\n- Kalori açığı\\n- Şeker azalt';
}

document.getElementById('programDetail').innerText=text;
}

/* AI */
function createPlan(){
let g=document.getElementById('goal').value.toLowerCase();
let t=g.includes('kilo')?'kardiyo + diyet':'ağırlık + protein';
document.getElementById('plan').innerText=t;
}

/* WEIGHT */
let data=JSON.parse(localStorage.getItem('w'))||[];

function addW(){
data.push(w.value);
localStorage.setItem('w',JSON.stringify(data));
render();
}

function render(){
document.getElementById('list').innerText=data.join(' → ')+' kg';
}
render();

/* TASK */
function generateTasks(){
let arr=['su iç','koş','spor yap','protein ye','uyu'];
let r=arr.sort(()=>0.5-Math.random()).slice(0,3);
document.getElementById('taskList').innerText=r.join('\\n');
}

</script>

</body>
</html>
